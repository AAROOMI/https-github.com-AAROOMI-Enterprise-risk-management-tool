<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk Assessment Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
<script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.20.0"
  }
}
</script>
<style type="text/css" media="print">
  @page {
    size: A4;
    margin: 1.5cm;
  }
  body {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .page-break-after {
    page-break-after: always;
  }
  tr, table, section {
    page-break-inside: avoid;
  }
  thead {
    display: table-header-group;
  }
</style>
<style>
  .report-container .page {
    position: relative;
    min-height: 25.7cm; /* A4 height - margins */
    padding-bottom: 2rem; /* Space for footer */
  }

  .report-container .page:after {
    counter-increment: page;
    content: "Page " counter(page);
    position: absolute;
    bottom: 0;
    right: 0;
    font-size: 0.75rem;
    color: #6b7280;
  }
  
  @media print {
    html, body {
        background-color: white !important;
        background-image: none !important;
    }
    .report-container {
      padding: 0 !important;
      margin: 0 !important;
    }
    .report-container .page {
        min-height: 0; /* Let content flow naturally */
        padding-bottom: 0; /* Remove padding */
    }
    .report-container .page:after {
        display: none; /* Handled by @page footer */
    }
  }

  .field-glow {
    box-shadow: 0 0 15px 3px rgba(6, 182, 212, 0.7), 0 0 5px 1px rgba(6, 182, 212, 0.8) inset;
    border-color: rgba(6, 182, 212, 0.9) !important;
    transition: box-shadow 0.3s ease-in-out, border-color 0.3s ease-in-out;
    animation: pulse-glow 2s infinite ease-in-out;
  }

  @keyframes pulse-glow {
    0% { box-shadow: 0 0 15px 3px rgba(6, 182, 212, 0.7), 0 0 5px 1px rgba(6, 182, 212, 0.8) inset; }
    50% { box-shadow: 0 0 25px 8px rgba(6, 182, 212, 0.5), 0 0 8px 2px rgba(6, 182, 212, 0.6) inset; }
    100% { box-shadow: 0 0 15px 3px rgba(6, 182, 212, 0.7), 0 0 5px 1px rgba(6, 182, 212, 0.8) inset; }
  }
</style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-gradient-to-br from-gray-900 via-slate-900 to-cyan-900/50">
  <div id="root"></div>
  <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
